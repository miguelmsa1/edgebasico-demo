#cloud-config
package_update: true
package_upgrade: false

packages:
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - ufw

write_files:
  - path: /opt/smartedge-demo/env
    owner: root:root
    permissions: '0644'
    content: |
      IMAGE_REF=ghcr.io/<usuario-o-organizacion>/smartedge-demo:latest
      EDGE_REGION=Bilbao
      CONTAINER_NAME=smartedge-demo
      HOST_PORT=80
      # Si la imagen en GHCR es privada, informa estos valores:
      # REGISTRY_HOST=ghcr.io
      # REGISTRY_USER=<usuario>
      # REGISTRY_TOKEN=<github-token-con-read-packages>

  - path: /opt/smartedge-demo/install-and-run.sh
    owner: root:root
    permissions: '0755'
    content: |
      #!/usr/bin/env bash
      set -euo pipefail

      . /opt/smartedge-demo/env

      . /etc/os-release
      case "${ID}" in
        ubuntu|debian)
          DOCKER_OS="${ID}"
          ;;
        *)
          echo "Sistema no soportado automaticamente para Docker repo: ${ID}" >&2
          exit 1
          ;;
      esac

      install -m 0755 -d /etc/apt/keyrings
      if [ ! -f /etc/apt/keyrings/docker.gpg ]; then
        curl -fsSL "https://download.docker.com/linux/${DOCKER_OS}/gpg" | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        chmod a+r /etc/apt/keyrings/docker.gpg
      fi

      echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/${DOCKER_OS} ${VERSION_CODENAME} stable" > /etc/apt/sources.list.d/docker.list

      apt-get update
      apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin

      systemctl enable --now docker

      ufw allow OpenSSH
      ufw allow "${HOST_PORT}/tcp"
      ufw --force enable

      if [ -n "${REGISTRY_HOST:-}" ] && [ -n "${REGISTRY_USER:-}" ] && [ -n "${REGISTRY_TOKEN:-}" ]; then
        echo "${REGISTRY_TOKEN}" | docker login "${REGISTRY_HOST}" -u "${REGISTRY_USER}" --password-stdin
      fi

      docker rm -f "${CONTAINER_NAME}" >/dev/null 2>&1 || true
      docker pull "${IMAGE_REF}"
      docker run -d \
        --name "${CONTAINER_NAME}" \
        --restart unless-stopped \
        -p "${HOST_PORT}:80" \
        -e EDGE_REGION="${EDGE_REGION}" \
        "${IMAGE_REF}"

runcmd:
  - /opt/smartedge-demo/install-and-run.sh

final_message: "Smart Edge demo deployed. Check http://$PUBLIC_IPV4"
